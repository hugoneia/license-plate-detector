workflows:
  react-native-android:
    name: Detector de MAtrículas OCR
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Instalar dependencias de la app
        script: |
          npm install --legacy-peer-deps || yarn install
      - name: Generar carpeta nativa de Android
        script: |
          if [ ! -d "android" ]; then
            echo "Carpeta android no encontrada. Generando entorno nativo con Expo..."
            npx expo prebuild --platform android --no-install || echo "Aviso: No se pudo ejecutar el prebuild"
          fi
      - name: Configurar permisos y construir APK Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
